<script>
  // Try loading root stylesheet used in production; if it fails (404/html), fall back to local design-system
  (function () {
    const tryHref = '/styles.css';
    const fallback = '../../design-system/styles.css';
    function loadHref(href) {
      const l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = href;
      l.onload = () => { };
      l.onerror = () => {
        if (href !== fallback) { loadHref(fallback); }
      };
      document.head.appendChild(l);
    }
    loadHref(tryHref);

    const params = new URLSearchParams(window.location.search);
    if (params.get('embed') === '1') document.documentElement.classList.add('pe-embed-mode');
  })();
</script>

  <script>
    // Inject command-bar icons from design-system/icon-registry.json (dev: synchronous so available before scripts run)
    (function () {
      try {
        var req = new XMLHttpRequest();
        req.open('GET', '../../design-system/icon-registry.json', false);
        req.send(null);
        if (req.status === 200 || req.responseText) {
          var reg = JSON.parse(req.responseText);
          var items = reg && reg.regular ? reg.regular : [];
          var map = {};
          items.forEach(function (it) { if (it && it.title && it.source) map[it.title] = it.source; });

          var get = function (name) { return map[name] || '' };
          var btnToggle = document.getElementById('cb-toggle-blocks');
          var undoBtn = document.getElementById('cb-undo');
          var redoBtn = document.getElementById('cb-redo');
          var leftPanelToggle = document.getElementById('pe-toggle-left');
          var root = document.documentElement;

          // map of friendly icon names to registry titles (closest matches)
          var lookup = {
            arrow_left: 'ic_fluent_arrow_left_24_regular',
            arrow_right: 'ic_fluent_arrow_right_24_regular',
            panel_left: 'ic_fluent_panel_left_24_regular',
            edit_24: 'ic_fluent_edit_24_regular',
            eye_24: 'ic_fluent_eye_24_regular',
            arrow_undo_24: 'ic_fluent_arrow_undo_24_regular',
            arrow_redo_24: 'ic_fluent_arrow_redo_24_regular',
            desktop_24: 'ic_fluent_screen_cast_24_regular',
            tablet_24: 'ic_fluent_device_tablet_24_regular',
            mobile_24: 'ic_fluent_device_laptop_mobile_24_regular',
            save_24: 'ic_fluent_save_24_regular',
            send_24: 'ic_fluent_send_24_regular',
            settings_24: 'ic_fluent_settings_24_regular',
            more_vertical_24: 'ic_fluent_more_vertical_24_regular'
          };

          function setIconFor(el, key) {
            if (!el) return;
            var title = lookup[key] || key;
            var src = map[title] || '';
            if (src) el.innerHTML = src;
          }

          // set icons for all elements that request them via data-icon
          Array.from(document.querySelectorAll('[data-icon]')).forEach(function (node) {
            var name = node.getAttribute('data-icon');
            setIconFor(node, name);
          });

          // update toggle behavior for blocks panel
          function updateToggleIcon() {
            if (!btnToggle) return;
            var el = btnToggle.querySelector('.cb-icon');
            if (root.classList.contains('collapsed-left')) {
              setIconFor(el, 'panel_left');
              btnToggle.title = 'Open blocks panel';
            } else {
              setIconFor(el, 'panel_left');
              btnToggle.title = 'Toggle blocks panel';
            }
          }

          updateToggleIcon();

          if (btnToggle) {
            btnToggle.addEventListener('click', function (e) {
              e.preventDefault();
              if (leftPanelToggle) {
                leftPanelToggle.click();
                setTimeout(updateToggleIcon, 50);
              } else {
                var cur = root.classList.toggle('collapsed-left');
                localStorage.setItem('editor.leftCollapsed', cur ? '1' : '0');
                updateToggleIcon();
              }
            });
          }
        }
      } catch (e) { }
    })();
  </script>

  <script>
    // Merge icons from block-registry.json into the in-memory block definitions
    // Resolve icon *keys* (e.g. ic_fluent_...) to actual SVG `source` from the centralized icon registry.
    (function () {
      try {
        if (!window.EDITOR_BLOCK_DEFINITIONS) return;

        // Load icon registry (synchronously during dev bootstrap so the inserter shows icons immediately)
        var iconMap = {};
        try {
          var rIcons = new XMLHttpRequest();
          rIcons.open('GET', '../../design-system/icon-registry.json', false);
          rIcons.send(null);
          if (rIcons.status === 200 && rIcons.responseText) {
            try {
              var regIcons = JSON.parse(rIcons.responseText);
              var items = regIcons && regIcons.regular ? regIcons.regular : [];
              items.forEach(function (it) { if (it && it.title && it.source) iconMap[it.title] = it.source; });
            } catch (e) { }
          }
        } catch (e) { }

        var req = new XMLHttpRequest();
        req.open('GET', '../block-registry.json', false);
        req.send(null);
        if (req.status === 200 || req.responseText) {
          try {
            var reg = JSON.parse(req.responseText);
            var types = reg && reg.blockTypes ? reg.blockTypes : {};
            Object.keys(types).forEach(function (k) {
              var t = types[k];
              if (t && t.icon && window.EDITOR_BLOCK_DEFINITIONS[k]) {
                var iconVal = t.icon;
                // If the block registry stores an icon key, replace with the SVG source
                if (iconMap[iconVal]) {
                  window.EDITOR_BLOCK_DEFINITIONS[k].icon = iconMap[iconVal];
                } else {
                  // otherwise keep whatever was provided (could be inline svg or fallback char)
                  window.EDITOR_BLOCK_DEFINITIONS[k].icon = iconVal;
                }
              }
            });
          } catch (e) { }
        }
      } catch (e) { }
    })();
  </script>

        if (window.ToolbarFactory && typeof ToolbarFactory.setTopToolbarHost === 'function') {
          ToolbarFactory.setTopToolbarHost(host);
        } else {
          // retry when toolbar factory loads later
          var iv = setInterval(function () { if (window.ToolbarFactory && typeof ToolbarFactory.setTopToolbarHost === 'function') { clearInterval(iv); ToolbarFactory.setTopToolbarHost(host); } }, 250);
        }
      } catch (e) { }
    })();

  <script>
    // Inject admin link into the site header, only when running under the private app path
    (function () {
      try {
        if (!location.pathname || !location.pathname.includes('/app-private')) return;
        function findIconSource(title) {
          try {
            var req = new XMLHttpRequest();
            req.open('GET', '../../design-system/icon-registry.json', false);
            req.send(null);
            if (req.status === 200 && req.responseText) {
              var reg = JSON.parse(req.responseText);
              var items = reg && reg.regular ? reg.regular : [];
              for (var i = 0; i < items.length; i++) {
                var it = items[i];
                if (it && it.title === title && it.source) return it.source;
              }
            }
          } catch (e) { }
          return null;
        }

        window.addEventListener('load', function () {
          try {
            var header = document.getElementById('site-header');
            if (!header) return;
            if (document.getElementById('site-admin-link')) return; // already present
            var a = document.createElement('a');
            a.id = 'site-admin-link';
            a.className = 'site-admin-link';
            a.href = '../admin/';
            a.title = 'Admin';
            var iconSpan = document.createElement('span');
            iconSpan.className = 'cb-icon';
            // try registry title used elsewhere
            var svg = findIconSource('ic_fluent_settings_24_regular') || findIconSource('ic_fluent_app_folder_settings_24_regular');
            if (svg) iconSpan.innerHTML = svg; else iconSpan.innerHTML = '';
            a.appendChild(iconSpan);
            header.appendChild(a);
          } catch (e) { }
        });
      } catch (e) { }
    })();
  </script>
  <script>
    // Wire collapsible panels for the harness; persist state in localStorage
    (function () {
      const leftToggle = document.getElementById('pe-toggle-left');
      const rightToggle = document.getElementById('pe-toggle-right');
      const root = document.documentElement;
      const iconMap = (function () {
        try {
          const req = new XMLHttpRequest();
          req.open('GET', '../../design-system/icon-registry.json', false);
          req.send(null);
          if (req.status === 200 && req.responseText) {
            const reg = JSON.parse(req.responseText);
            return (reg && reg.regular || []).reduce((acc, item) => {
              if (item && item.title && item.source) acc[item.title] = item.source;
              return acc;
            }, {});
          }
        } catch (e) { }
        return {};
      })();
      function setLeftToggleIcon() {
        if (!leftToggle) return;
        const icon = root.classList.contains('collapsed-left')
          ? iconMap.ic_fluent_arrow_expand_24_regular
          : iconMap.ic_fluent_panel_left_24_regular;
        leftToggle.innerHTML = icon || 'â˜°';
        leftToggle.title = root.classList.contains('collapsed-left') ? 'Expand blocks panel' : 'Collapse blocks panel';
        leftToggle.setAttribute('aria-label', leftToggle.title);
      }
      function applyState() {
        if (localStorage.getItem('editor.leftCollapsed') === '1') root.classList.add('collapsed-left'); else root.classList.remove('collapsed-left');
        if (localStorage.getItem('editor.rightCollapsed') === '1') root.classList.add('collapsed-right'); else root.classList.remove('collapsed-right');
        setLeftToggleIcon();
      }
      applyState();
      if (leftToggle) leftToggle.addEventListener('click', () => {
        const cur = root.classList.toggle('collapsed-left');
        localStorage.setItem('editor.leftCollapsed', cur ? '1' : '0');
        setLeftToggleIcon();
      });
      if (rightToggle) rightToggle.addEventListener('click', () => {
        const cur = root.classList.toggle('collapsed-right');
        localStorage.setItem('editor.rightCollapsed', cur ? '1' : '0');
      });
      // keyboard shortcuts: Alt+1/Alt+3 to toggle
      window.addEventListener('keydown', (e) => {
        if (e.altKey && !e.shiftKey && !e.ctrlKey) {
          if (e.key === '1') { leftToggle && leftToggle.click(); e.preventDefault(); }
          if (e.key === '3') { rightToggle && rightToggle.click(); e.preventDefault(); }
        }
      });
    })();
  </script>
